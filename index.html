    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ededed;
            --text-muted: #9ca3af;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
            --card-hover-border: rgba(168, 85, 247, 0.5);
            --pill-bg: rgba(255, 255, 255, 0.05);
            --pill-border: rgba(255, 255, 255, 0.1);
            --accent: #9333ea;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body.light-mode {
            --bg-color: #f3f4f6;
            --text-main: #111827;
            --text-muted: #4b5563;
            --card-bg: #ffffff;
            --card-border: #e5e7eb;
            --card-hover-border: #9333ea;
            --pill-bg: #ffffff;
            --pill-border: #d1d5db;
            --accent: #7e22ce;
            --input-bg: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        h1,
        h2,
        h3 {
            font-family: 'Syne', sans-serif;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }
        
        .slang-card {
            content-visibility: auto;
            contain-intrinsic-size: 1px 200px;
        }

        body.light-mode .glass {
            backdrop-filter: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .glow-hover:hover {
            border-color: var(--card-hover-border);
            transform: translateY(-2px);
        }

        body:not(.light-mode) .glow-hover:hover {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        body.light-mode .glow-hover:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .category-pill {
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
            background: var(--pill-bg);
            border: 1px solid var(--pill-border);
            color: var(--text-main);
        }

        .category-pill:hover {
            border-color: var(--accent);
        }

        .category-pill.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.4);
        }

        .search-input {
            background-color: var(--input-bg);
            border-color: var(--card-border);
            color: var(--text-main);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .copy-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 99px;
            z-index: 100;
        }

        mark {
            background: rgba(168, 85, 247, 0.4);
            color: inherit;
            padding: 0 2px;
            border-radius: 2px;
        }
    </style>
</head>

                voices.find(v => v.lang === ttsLang && (v.name.includes('Google') || v.name.includes('Natural'))) ||
                // 2. Try any voice in that language family high quality
                voices.find(v => v.lang.startsWith(langPrefix) && (v.name.includes('Google') || v.name.includes('Natural'))) ||
                // 3. Fallback to any voice available for that language
                voices.find(v => v.lang.startsWith(langPrefix));

            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }

            utterance.lang = ttsLang;
            utterance.rate = 0.85; // Slightly slower for natural flow
            utterance.pitch = 1.05; // Un ton légèrement plus haut pour paraître moins monotone
            
            utterance.onstart = () => btn.classList.add('text-purple-500', 'animate-pulse', 'opacity-100');
            utterance.onend = () => btn.classList.remove('text-purple-500', 'animate-pulse', 'opacity-100');
            utterance.onerror = () => btn.classList.remove('text-purple-500', 'animate-pulse', 'opacity-100');

            window.speechSynthesis.speak(utterance);
        }
        // Hall of Fame Update
        function updateHallOfFame() {
            const topAura = Object.entries(auraScores)
                .sort(([,a], [,b]) => b - a)
                .slice(0, 3)
                .filter(([,score]) => score !== 0);

            document.getElementById('hallOfFame').classList.toggle('hidden', topAura.length === 0);
            leaderboard.innerHTML = topAura.map(([word, score], i) => `
                <div class="bg-white/5 px-4 py-2 rounded-full border border-yellow-500/20">
                    <span class="text-yellow-500">#${i+1}</span> ${word} (${score > 0 ? '+' : ''}${score})
                </div>
            `).join('');
        }

        // Aura functionality
        function changeAura(word, delta) {
            auraScores[word] = (auraScores[word] || 0) + delta;
            localStorage.setItem('genz_aura_scores', JSON.stringify(auraScores));
            renderCards();
        }

        // Update URL to make searches shareable
        function updateURL(term, category) {
            const url = new URL(window.location);
            if (term) url.searchParams.set('q', term);
            else url.searchParams.delete('q');

            if (category && category !== 'All') url.searchParams.set('cat', category);
            else url.searchParams.delete('cat');

            window.history.replaceState({}, '', url);
        }

        // Helper to highlight matching text
        function highlightMatch(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<mark class="bg-purple-500/40 text-inherit p-0 rounded-sm">$1</mark>');
        }

        // Scoring function for fuzzy search relevance
        function getRelevanceScore(query, item) {
            const word = item.word.toLowerCase();
            const key = item.searchKey;
            
            if (word === query) return 100; // Exact match
            if (word.startsWith(query)) return 80; // Starts with query
            if (word.includes(query)) return 60; // Word contains query
            if (key.includes(query)) return 40; // Definition contains query
            
            // Character-by-character fuzzy match
            let i = 0, j = 0;
            while (i < query.length && j < key.length) {
                if (query[i] === key[j]) i++;
                j++;
            }
            return i === query.length ? 10 : 0;
        }

        function renderCards() {
            const searchTerm = searchInput.value.toLowerCase();
            updateURL(searchTerm, currentCategory);
            
            const filtered = processedData
                .map(item => ({ ...item, score: searchTerm ? getRelevanceScore(searchTerm, item) : 1 }))
                .filter(item => {
                    const matchesSearch = item.score > 0;
                    let matchesCategory = currentCategory === 'All' || currentCategory === 'Trending' || item.category === currentCategory;
                    
                    if (currentCategory === 'Favorites') {
                        matchesCategory = favorites.includes(item.word);
                    }
                    
                    return matchesSearch && matchesCategory;
                })
                .sort((a, b) => {
                    // If we are in trending and not actively searching, sort by timestamp
                    if (currentCategory === 'Trending' && !searchTerm) {
                        return b.timestamp - a.timestamp;
                    }
                    return b.score - a.score; // Otherwise sort by search relevance
                });

            countDisplay.textContent = filtered.length === slangData.length 
                ? `${slangData.length} terms archived.` 
                : `Showing ${filtered.length} of ${slangData.length} terms.`;

            updateHallOfFame();

            // Handle empty state
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center opacity-50">
                        <p class="text-4xl mb-4">💀</p>
                        <p class="text-xl font-bold">No rizz found. You're tweaking.</p>
                    </div>
                `;
                return;
            }

            // Use DocumentFragment for high-performance DOM batching
            const fragment = document.createDocumentFragment();
            
            filtered.forEach(item => {
                let tagClass = 'text-purple-400 border-purple-500/30';
                if (item.category === 'Acronym') tagClass = 'text-pink-400 border-pink-500/30';
                if (item.category === 'Brainrot') tagClass = 'text-green-400 border-green-500/30';
                if (item.category === 'People') tagClass = 'text-red-400 border-red-500/30';
                if (item.category === 'Gaming') tagClass = 'text-blue-400 border-blue-500/30';
                if (item.category === 'Phrase') tagClass = 'text-yellow-400 border-yellow-500/30';

                const isFav = favorites.includes(item.word);
                const favClass = isFav ? 'text-red-500 fill-red-500 opacity-100' : 'opacity-40 hover:opacity-100';

                const aura = auraScores[item.word] || 0;
                const auraColor = aura >= 0 ? 'text-green-500' : 'text-red-500';

                const card = document.createElement('div');
                card.className = 'glass slang-card p-6 rounded-3xl glow-hover flex flex-col justify-between';
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="text-2xl font-bold break-all pr-2">
                                ${highlightMatch(item.word, searchTerm)}
                            </h2>
                            <div class="flex gap-1">
                                <button onclick="speakTerm('${item.word.replace(/'/g, "\\'")}', this)" class="opacity-40 hover:opacity-100 transition-opacity p-1" title="Pronounce">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                                </button>
                                <button onclick="toggleFavorite('${item.word.replace(/'/g, "\\'")}')" class="${favClass} transition-all p-1" title="Favorite">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                </button>
                                <button onclick="copyTerm('${item.word.replace(/'/g, "\\'")}', '${item.def.replace(/'/g, "\\'")}')" class="opacity-40 hover:opacity-100 transition-opacity p-1" title="Copy Definition">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                </button>
                            </div>
                        </div>
                        <div class="mb-4">
                            <span class="text-[10px] font-bold uppercase tracking-widest px-2 py-1 bg-white/10 rounded-md border ${tagClass} whitespace-nowrap">
                                ${item.category}
                            </span>
                        </div>
                        <p class="mb-4 leading-relaxed text-sm md:text-base opacity-90">
                            ${highlightMatch(item.def, searchTerm)}
                        </p>
                    </div>
                    <div class="mt-4 pt-4 border-t flex justify-between items-center" style="border-color: var(--card-border)">
                        <p class="text-xs italic opacity-70 max-w-[60%]">"${item.ex}"</p>
                        <div class="flex items-center gap-2 bg-black/20 rounded-full px-3 py-1 border border-white/5">
                            <button onclick="changeAura('${item.word.replace(/'/g, "\\'")}', -100)" class="hover:scale-125 transition-transform text-xs">📉</button>
                            <span class="text-[10px] font-black tracking-tighter ${auraColor}">
                                ${aura > 0 ? '+' : ''}${aura} AURA
                            </span>
                            <button onclick="changeAura('${item.word.replace(/'/g, "\\'")}', 100)" class="hover:scale-125 transition-transform text-xs">📈</button>
                        </div>
                    </div>
                `;
                fragment.appendChild(card);
            });

            grid.innerHTML = '';
            grid.appendChild(fragment);
        }

        // Optimized event listeners
        searchInput.addEventListener('input', debounce(renderCards));

        // Use event delegation for category filtering
        categoryContainer.addEventListener('click', (e) => {
            const pill = e.target.closest('.category-pill');
            if (!pill) return;

            categoryContainer.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            currentCategory = pill.getAttribute('data-category');
            renderCards();
        });

        function randomWord() {
            const random = slangData[Math.floor(Math.random() * slangData.length)];
            searchInput.value = random.word.split(' /')[0];
            currentCategory = 'All';
            categoryContainer.querySelectorAll('.category-pill').forEach(p => {
                p.classList.toggle('active', p.getAttribute('data-category') === 'All');
            });
            renderCards();
        }

        // Handle browser Back/Forward buttons
        window.addEventListener('popstate', () => {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q') || '';
            const cat = params.get('cat') || 'All';

            searchInput.value = query;
            currentCategory = cat;

            categoryContainer.querySelectorAll('.category-pill').forEach(p => {
                p.classList.toggle('active', p.getAttribute('data-category') === cat);
            });

            renderCards();
        });

        // Initialize from URL params if they exist
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');
            const cat = params.get('cat');

            if (query) searchInput.value = query;
            if (cat) {
                currentCategory = cat;
                categoryContainer.querySelectorAll('.category-pill').forEach(p => {
                    p.classList.toggle('active', p.getAttribute('data-category') === cat);
                });
            }
            renderCards();
        });
    </script>
</body>


</html>
